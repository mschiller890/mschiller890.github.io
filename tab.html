<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Custom New Tab</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-family: 'Roboto', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .clock {
    font-size: 4rem;
    margin-bottom: 20px;
    font-weight: 700;
    text-shadow: 0 0 10px rgba(0,0,0,0.3);
  }
  .search-container {
    width: 100%;
    max-width: 600px;
    display: flex;
    justify-content: center;
    margin-bottom: 30px;
  }
  input[type="text"] {
    flex-grow: 1;
    padding: 12px 16px;
    font-size: 1.2rem;
    border: none;
    border-radius: 24px 0 0 24px;
    outline: none;
  }
  button {
    padding: 12px 20px;
    font-size: 1.2rem;
    border: none;
    background: #4caf50;
    color: white;
    border-radius: 0 24px 24px 0;
    cursor: pointer;
    transition: background 0.3s;
  }
  button:hover {
    background: #45a049;
  }
  .links {
    display: flex;
    gap: 30px;
  }
  .links a {
    color: white;
    text-decoration: none;
    font-weight: 600;
    font-size: 1.1rem;
    padding: 8px 16px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    transition: background 0.3s;
  }
  .links a:hover {
    background: rgba(255, 255, 255, 0.4);
  }
  @media (max-width: 600px) {
    .links {
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }
  }
</style>
</head>
<body>
  <div class="clock" id="clock">00:00</div>

  <form class="search-container" id="searchForm" action="https://www.google.com/search" method="GET" target="_blank" autocomplete="off">
    <input type="text" name="q" placeholder="Search Google..." autofocus />
    <button type="submit">Go</button>
  </form>

  <div class="links">
    <a href="https://mail.google.com" target="_blank">Gmail</a>
    <a href="https://news.ycombinator.com" target="_blank">Hacker News</a>
    <a href="https://github.com" target="_blank">GitHub</a>
    <a href="https://reddit.com" target="_blank">Reddit</a>
  </div>

<script>
  function updateClock() {
    const clock = document.getElementById('clock');
    const now = new Date();
    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');
    clock.textContent = `${h}:${m}`;
  }
  updateClock();
  setInterval(updateClock, 1000);
</script>
</body>
</html>
