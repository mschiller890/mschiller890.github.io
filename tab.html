<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brave New Tab</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: #fff;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(255,255,255,0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255,255,255,0.03) 0%, transparent 20%);
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 2rem;
            height: calc(100vh - 4rem);
        }

        /* Header Section */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .time-date {
            text-align: center;
        }

        .time {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .date {
            font-size: 1.1rem;
            opacity: 0.8;
            font-weight: 300;
        }

        .weather {
            text-align: right;
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .weather i {
            margin-right: 0.5rem;
            font-size: 1.5rem;
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Search Bar */
        .search-container {
            position: relative;
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
        }

        .search-bar {
            width: 100%;
            padding: 1rem 2rem;
            padding-left: 3.5rem;
            font-size: 1.1rem;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            color: white;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            outline: none;
        }

        .search-bar:focus {
            border-color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .search-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 1.2rem;
        }

        /* Quick Links */
        .quick-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1.5rem;
            padding: 1rem;
        }

        .link-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 1.5rem 1rem;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .link-card:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .link-card i {
            font-size: 2rem;
            margin-bottom: 0.8rem;
            display: block;
        }

        .link-card span {
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .sidebar-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .sidebar-card h3 {
            margin-bottom: 1rem;
            font-size: 1.2rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sidebar-card h3 i {
            font-size: 1.1rem;
            opacity: 0.8;
        }

        .bookmarks {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .bookmark {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.6rem;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            transition: all 0.2s ease;
        }

        .bookmark:hover {
            background: rgba(255,255,255,0.1);
        }

        .bookmark i {
            font-size: 1rem;
            opacity: 0.8;
        }

        .quote {
            font-style: italic;
            line-height: 1.6;
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .quote-author {
            text-align: right;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            opacity: 0.7;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
                min-height: 100vh;
            }
            
            .header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            
            .weather {
                text-align: center;
            }
            
            .time {
                font-size: 2.5rem;
            }
            
            .search-container {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }
            
            .time {
                font-size: 2rem;
            }
            
            .quick-links {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container > * {
            animation: fadeIn 0.6s ease-out;
        }

        .container > *:nth-child(2) { animation-delay: 0.1s; }
        .container > *:nth-child(3) { animation-delay: 0.2s; }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="header">
                <div class="time-date">
                    <div class="time" id="time">00:00:00</div>
                    <div class="date" id="date">Monday, January 1, 2024</div>
                </div>
                <div class="weather">
                    <i class="fas fa-sun"></i>
                    <span>72°F • Sunny</span>
                </div>
            </div>

            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-bar" placeholder="Search or enter a website address..." id="searchInput">
            </div>

            <div class="quick-links">
                <a href="https://github.com" class="link-card">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                </a>
                <a href="https://gmail.com" class="link-card">
                    <i class="fas fa-envelope"></i>
                    <span>Gmail</span>
                </a>
                <a href="https://youtube.com" class="link-card">
                    <i class="fab fa-youtube"></i>
                    <span>YouTube</span>
                </a>
                <a href="https://twitter.com" class="link-card">
                    <i class="fab fa-twitter"></i>
                    <span>Twitter</span>
                </a>
                <a href="https://reddit.com" class="link-card">
                    <i class="fab fa-reddit"></i>
                    <span>Reddit</span>
                </a>
                <a href="https://notion.so" class="link-card">
                    <i class="fas fa-book"></i>
                    <span>Notion</span>
                </a>
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-card">
                <h3><i class="fas fa-bookmark"></i> Bookmarks</h3>
                <div class="bookmarks">
                    <a href="https://developer.mozilla.org" class="bookmark">
                        <i class="fas fa-code"></i>
                        <span>MDN Web Docs</span>
                    </a>
                    <a href="https://stackoverflow.com" class="bookmark">
                        <i class="fab fa-stack-overflow"></i>
                        <span>Stack Overflow</span>
                    </a>
                    <a href="https://css-tricks.com" class="bookmark">
                        <i class="fas fa-paint-brush"></i>
                        <span>CSS Tricks</span>
                    </a>
                    <a href="https://caniuse.com" class="bookmark">
                        <i class="fas fa-chart-line"></i>
                        <span>Can I Use</span>
                    </a>
                </div>
            </div>

            <div class="sidebar-card">
                <h3><i class="fas fa-quote-left"></i> Daily Quote</h3>
                <div class="quote" id="quote">
                    The only way to do great work is to love what you do.
                </div>
                <div class="quote-author">— Steve Jobs</div>
            </div>
        </div>
    </div>

    <script>
        // Update time and date
        function updateTime() {
            const now = new Date();
            const timeElement = document.getElementById('time');
            const dateElement = document.getElementById('date');
            
            // Format time
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            timeElement.textContent = `${hours}:${minutes}:${seconds}`;
            
            // Format date
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            dateElement.textContent = now.toLocaleDateString('en-US', options);
        }

        // Handle search
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const query = this.value.trim();
                if (query) {
                    // Check if it's a URL or search query
                    if (query.includes('.') && !query.includes(' ')) {
                        // It's likely a URL
                        window.location.href = query.startsWith('http') ? query : 'https://' + query;
                    } else {
                        // It's a search query
                        window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
                    }
                }
            }
        });

        // Array of quotes for daily inspiration
        const quotes = [
            {
                text: "The only way to do great work is to love what you do.",
                author: "Steve Jobs"
            },
            {
                text: "Innovation distinguishes between a leader and a follower.",
                author: "Steve Jobs"
            },
            {
                text: "The future belongs to those who believe in the beauty of their dreams.",
                author: "Eleanor Roosevelt"
            },
            {
                text: "Success is not final, failure is not fatal: it is the courage to continue that counts.",
                author: "Winston Churchill"
            },
            {
                text: "The best way to predict the future is to create it.",
                author: "Peter Drucker"
            },
            {
                text: "Your time is limited, so don't waste it living someone else's life.",
                author: "Steve Jobs"
            }
        ];

        // Set random quote
        function setRandomQuote() {
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('quote').textContent = randomQuote.text;
            document.querySelector('.quote-author').textContent = `— ${randomQuote.author}`;
        }

        // Initialize
        updateTime();
        setRandomQuote();
        setInterval(updateTime, 1000);

        // Add focus to search bar on load
        window.addEventListener('load', () => {
            document.getElementById('searchInput').focus();
        });
    </script>
</body>
</html>
